name: "Tests: MongoDB"

on:
  - pull_request

jobs:
  mongodb:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "5.3"
            phpunit: "4"
          - php: "5.4"
            phpunit: "4"
          - php: "5.5"
            phpunit: "4"
          - php: "5.6"
            phpunit: "4"
          - php: "7.0"
            phpunit: "6"
          - php: "7.1"
            phpunit: "7.5"
          - php: "7.2"
            phpunit: "7.5"
          - php: "7.3"
            phpunit: "7.5"
          - php: "7.4"
            phpunit: "7.5"
          - php: "8.0"
            phpunit: "7.5"
          - php: "8.1"
            phpunit: "7.5"
          - php: "8.2"
            phpunit: "7.5"
          - php: "8.3"
            phpunit: "7.5"
          - php: "8.4"
            phpunit: "7.5"

    env:
      PHPUNIT_VERSION: "${{ matrix.phpunit }}"
      PHP_VERSION: "${{ matrix.php }}"
      # https://getcomposer.org/doc/03-cli.md#environment-variables
      COMPOSER_NO_SECURITY_BLOCKING: "1"

    services:
      mongodb:
        image: percona/percona-server-mongodb:4.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: xdebug, xhprof, mongo, mongodb, tideways_xhprof

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Install dependencies
        run: |
          composer remove alcaeus/mongo-php-adapter --no-update --dev
          composer install --prefer-dist
          composer require --dev phpunit/phpunit:^$PHPUNIT_VERSION

      - name: Install extensions
        run: ./install-extensions.sh

      - name: Run PHPUnit tests
        run: composer test


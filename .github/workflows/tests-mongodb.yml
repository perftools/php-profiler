name: "Tests"

on:
  - pull_request
  - push

jobs:
  mongodb:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        php:
          - "7.1"
          - "7.2"
          - "7.3"
          - "7.4"
    env:
      PHPUNIT_VERSION: "7.5"
      PHP_VERSION: "${{ matrix.php }}"

    services:
      mongodb:
        image: percona/percona-server-mongodb:3.6
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: xdebug, xhprof, mongodb, tideways_xhprof

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v2
        env:
          CACHE_KEY: "${{ runner.os }}-php-${{ env.PHP_VERSION }}-phpunit-${{ env.PHPUNIT_VERSION }}-v2"
        with:
          path: vendor
          key: ${{ env.CACHE_KEY }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ env.CACHE_KEY }}-

      - name: Install dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: |
          composer install --prefer-dist --no-progress
          composer require --dev phpunit/phpunit:^$PHPUNIT_VERSION

      - name: Install extensions
        run: ./install-extensions.sh

      - name: Run PHPUnit tests
        run: composer test
        env:
          XHGUI_SAVE_HANDLER: "pdo"

